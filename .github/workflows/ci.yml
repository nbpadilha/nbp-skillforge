# CI: drift-gate. Fails if any generated file diverges from its recipe (or is orphaned).
name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18.17", "20", "22"]   # 18.17 = the declared minimum (engines), so the floor is truly exercised
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node-version }}" }
      - run: node --test                          # engine + lifecycle test suite
      - run: node bin/cli.mjs check --root examples  # drift-gate on the runnable example

# CI: drift-gate. Falha se algum arquivo gerado divergir da sua recipe (ou órfão).
name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: node bin/cli.mjs check --root examples
